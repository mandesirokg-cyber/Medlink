<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedLink Brazzaville - Plateforme de Santé Connectée</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563EB;
            --primary-dark: #1D4ED8;
            --secondary: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --bg: #F8FAFC;
            --card: #FFFFFF;
            --text: #0F172A;
            --text-secondary: #475569;
            --border: #E2E8F0;
            --shadow: 0 4px 6px rgba(0,0,0,0.07);
            --shadow-lg: 0 10px 15px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* Login Screen */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 20px;
        }

        .login-box {
            background: var(--card);
            padding: 40px;
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 450px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: var(--primary);
            font-size: 32px;
            margin-bottom: 10px;
        }

        .logo p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text);
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-secondary {
            background: var(--secondary);
        }

        .btn-secondary:hover {
            background: #059669;
        }

        .btn-danger {
            background: var(--danger);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text);
        }

        .btn-outline:hover {
            background: var(--bg);
        }

        /* Dashboard */
        .dashboard {
            display: none;
            min-height: 100vh;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 260px;
            background: var(--card);
            border-right: 1px solid var(--border);
            padding: 24px;
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h2 {
            color: var(--primary);
            font-size: 24px;
        }

        .user-info {
            margin-top: 15px;
            padding: 15px;
            background: var(--bg);
            border-radius: 8px;
        }

        .user-info strong {
            display: block;
            margin-bottom: 5px;
        }

        .user-info small {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 8px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .nav-link:hover,
        .nav-link.active {
            background: var(--primary);
            color: white;
        }

        .nav-link i {
            margin-right: 12px;
            width: 20px;
            text-align: center;
        }

        .main-content {
            margin-left: 260px;
            padding: 32px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 28px;
            color: var(--text);
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 14px;
            width: auto;
        }

        /* Cards */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .card {
            background: var(--card);
            padding: 24px;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 16px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .card-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
        }

        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .card-icon.blue {
            background: rgba(37, 99, 235, 0.1);
        }

        .card-icon.green {
            background: rgba(16, 185, 129, 0.1);
        }

        .card-icon.orange {
            background: rgba(245, 158, 11, 0.1);
        }

        .card-icon.red {
            background: rgba(239, 68, 68, 0.1);
        }

        /* Sections */
        .section {
            background: var(--card);
            padding: 24px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
        }

        /* Tables */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: var(--bg);
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        tr:hover {
            background: var(--bg);
        }

        .badge {
            display: inline-flex;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--secondary);
        }

        .badge-warning {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }

        .badge-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .badge-info {
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary);
        }

        /* Patient Profile */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 32px;
            padding: 24px;
            background: var(--bg);
            border-radius: 12px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 700;
        }

        .profile-info h2 {
            margin-bottom: 8px;
        }

        .profile-info p {
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .info-item {
            padding: 16px;
            background: var(--bg);
            border-radius: 8px;
        }

        .info-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card);
            border-radius: 16px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: var(--bg);
        }

        .modal-body {
            padding: 24px;
        }

        .modal-footer {
            padding: 24px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .modal-footer .btn {
            width: auto;
            min-width: 120px;
        }

        /* Timeline */
        .timeline {
            position: relative;
            padding-left: 30px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--border);
        }

        .timeline-item {
            position: relative;
            padding-bottom: 24px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -24px;
            top: 4px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary);
            border: 2px solid white;
            box-shadow: 0 0 0 2px var(--primary);
        }

        .timeline-date {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .timeline-content {
            background: var(--bg);
            padding: 16px;
            border-radius: 8px;
        }

        .timeline-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        /* Alerts */
        .alert {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border-left: 4px solid var(--secondary);
        }

        .alert-warning {
            background: rgba(245, 158, 11, 0.1);
            border-left: 4px solid var(--warning);
        }

        .alert-info {
            background: rgba(37, 99, 235, 0.1);
            border-left: 4px solid var(--primary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s;
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
                padding: 20px;
            }

            .cards-grid {
                grid-template-columns: 1fr;
            }

            .profile-header {
                flex-direction: column;
                text-align: center;
            }
        }

        /* Utility */
        .hidden {
            display: none !important;
        }

        .text-center {
            text-align: center;
        }

        .mt-4 {
            margin-top: 24px;
        }

        .mb-4 {
            margin-bottom: 24px;
        }

        .flex {
            display: flex;
        }

        .gap-2 {
            gap: 12px;
        }

        .flex-1 {
            flex: 1;
        }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div class="login-container" id="loginScreen">
        <div class="login-box">
            <div class="logo">
                <h1>🏥 MedLink</h1>
                <p>Plateforme de Santé Connectée - Brazzaville</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Adresse email</label>
                    <input type="email" id="loginEmail" placeholder="votre@email.com" required>
                </div>
                
                <div class="form-group">
                    <label for="loginPassword">Mot de passe</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                
                <div class="form-group">
                    <label for="loginRole">Connexion en tant que</label>
                    <select id="loginRole" required>
                        <option value="">Sélectionnez un profil</option>
                        <option value="patient">Patient</option>
                        <option value="doctor">Médecin</option>
                        <option value="nurse">Infirmier(ère)</option>
                        <option value="lab">Laboratoire</option>
                        <option value="pharmacy">Pharmacie</option>
                        <option value="admin">Administrateur</option>
                    </select>
                </div>
                
                <button type="submit" class="btn">Se connecter</button>
            </form>
            
            <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border);">
                <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 12px;">
                    <strong>Comptes de démonstration:</strong>
                </p>
                <div style="font-size: 12px; color: var(--text-secondary);">
                    <p><strong>Patient:</strong> sophie.diallo@gmail.com / password123</p>
                    <p><strong>Médecin:</strong> dr.kaya@chu-brazza.cg / password123</p>
                </div>
            </div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div class="dashboard" id="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>🏥 MedLink</h2>
                <div class="user-info">
                    <strong id="userName">Sophie Diallo</strong>
                    <small id="userRole">Patient</small>
                </div>
            </div>
            
            <ul class="nav-menu">
                <li class="nav-item">
                    <a class="nav-link active" onclick="showSection('accueil')">
                        <span>📊</span> Tableau de bord
                    </a>
                </li>
                <li class="nav-item" id="navDossier">
                    <a class="nav-link" onclick="showSection('dossier')">
                        <span>📋</span> Dossier Médical
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" onclick="showSection('rdv')">
                        <span>📅</span> Rendez-vous
                    </a>
                </li>
                <li class="nav-item" id="navOrdonnances">
                    <a class="nav-link" onclick="showSection('ordonnances')">
                        <span>💊</span> Ordonnances
                    </a>
                </li>
                <li class="nav-item" id="navResultats">
                    <a class="nav-link" onclick="showSection('resultats')">
                        <span>🔬</span> Résultats
                    </a>
                </li>
                <li class="nav-item" id="navImagerie">
                    <a class="nav-link" onclick="showSection('imagerie')">
                        <span>🖼️</span> Imagerie
                    </a>
                </li>
                <li class="nav-item" id="navPatients" style="display:none;">
                    <a class="nav-link" onclick="showSection('patients')">
                        <span>👥</span> Mes Patients
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" onclick="showSection('messages')">
                        <span>💬</span> Messagerie
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" onclick="logout()">
                        <span>🚪</span> Déconnexion
                    </a>
                </li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <div class="header">
                <h1 id="pageTitle">Tableau de bord</h1>
                <div class="header-actions">
                    <button class="btn btn-small btn-outline" onclick="refreshData()">
                        🔄 Actualiser
                    </button>
                    <button class="btn btn-small" onclick="openModal('rdvModal')">
                        + Nouveau RDV
                    </button>
                </div>
            </div>

            <!-- SECTION: ACCUEIL -->
            <div id="section-accueil" class="section-content">
                <!-- Stats Cards -->
                <div class="cards-grid">
                    <div class="card">
                        <div class="card-header">
                            <div>
                                <div class="card-title">Prochain rendez-vous</div>
                                <div class="card-value" id="nextRdvCount">2</div>
                            </div>
                            <div class="card-icon blue">📅</div>
                        </div>
                    </div>
                    
                    <div class="card">
                        <div class="card-header">
                            <div>
                                <div class="card-title">Ordonnances actives</div>
                                <div class="card-value" id="ordonnancesCount">3</div>
                            </div>
                            <div class="card-icon green">💊</div>
                        </div>
                    </div>
                    
                    <div class="card">
                        <div class="card-header">
                            <div>
                                <div class="card-title">Résultats disponibles</div>
                                <div class="card-value" id="resultatsCount">5</div>
                            </div>
                            <div class="card-icon orange">🔬</div>
                        </div>
                    </div>
                    
                    <div class="card">
                        <div class="card-header">
                            <div>
                                <div class="card-title">Messages non lus</div>
                                <div class="card-value" id="messagesCount">1</div>
                            </div>
                            <div class="card-icon red">💬</div>
                        </div>
                    </div>
                </div>

                <!-- Alerts -->
                <div class="alert alert-warning" id="alertHypertension" style="display:none;">
                    <strong>⚠️ Attention:</strong> Votre dernière tension était élevée (160/100). Pensez à prendre vos médicaments régulièrement.
                </div>

                <div class="alert alert-info">
                    <strong>ℹ️ Rappel:</strong> Votre prochain rendez-vous est le <strong>15 mai 2026 à 10h30</strong> avec le Dr. Kaya
                </div>

                <!-- Recent Activity -->
                <div class="section">
                    <div class="section-header">
                        <h3 class="section-title">Activité récente</h3>
                        <button class="btn btn-small btn-outline" onclick="showSection('dossier')">Voir tout</button>
                    </div>
                    <div class="timeline">
                        <div class="timeline-item">
                            <div class="timeline-date">Aujourd'hui, 09:30</div>
                            <div class="timeline-content">
                                <div class="timeline-title">Résultat de laboratoire disponible</div>
                                <p>Glycémie à jeun: 1.26 g/L</p>
                            </div>
                        </div>
                        <div class="timeline-item">
                            <div class="timeline-date">Hier, 14:15</div>
                            <div class="timeline-content">
                                <div class="timeline-title">Nouvelle ordonnance</div>
                                <p>Dr. Kaya a prescrit: Amlodipine 5mg, Metformine 500mg</p>
                            </div>
                        </div>
                        <div class="timeline-item">
                            <div class="timeline-date">Il y a 3 jours</div>
                            <div class="timeline-content">
                                <div class="timeline-title">Consultation médicale</div>
                                <p>Consultation de suivi - Hypertension et diabète</p>
                            </div>
                        </div>
                        <div class="timeline-item">
                            <div class="timeline-date">Il y a 5 jours</div>
                            <div class="timeline-content">
                                <div class="timeline-title">Examen d'imagerie</div>
                                <p>Échographie abdominale réalisée</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- SECTION: DOSSIER MÉDICAL -->
            <div id="section-dossier" class="section-content hidden">
                <div class="profile-header">
                    <div class="avatar" id="patientAvatar">SD</div>
                    <div class="profile-info">
                        <h2 id="patientName">Sophie Diallo</h2>
                        <p><strong>Né(e) le:</strong> 15 mars 1985 (41 ans)</p>
                        <p><strong>Groupe sanguin:</strong> O+</p>
                        <p><strong>Taille:</strong> 165 cm | <strong>Poids:</strong> 68 kg</p>
                    </div>
                </div>

                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">Allergies</div>
                        <div class="info-value" id="patientAllergies">Pénicilline, Aspirine</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Maladies chroniques</div>
                        <div class="info-value" id="patientConditions">Hypertension artérielle, Diabète type 2</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Traitement en cours</div>
                        <div class="info-value" id="patientTreatments">Amlodipine 5mg, Metformine 500mg</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Médecin traitant</div>
                        <div class="info-value">Dr. Jean-Luc Kaya</div>
                    </div>
                </div>

                <div class="section">
                    <div class="section-header">
                        <h3 class="section-title">Historique des consultations</h3>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Médecin</th>
                                    <th>Motif</th>
                                    <th>Diagnostic</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>10 mai 2026</td>
