    <script>
        // État de l'application
        let currentUser = null;
        let currentSection = 'accueil';

        // Données de démonstration
        const demoUsers = {
            'sophie.diallo@gmail.com': {
                password: 'password123',
                role: 'patient',
                name: 'Sophie Diallo',
                email: 'sophie.diallo@gmail.com'
            },
            'dr.kaya@chu-brazza.cg': {
                password: 'password123',
                role: 'doctor',
                name: 'Dr. Jean-Luc Kaya',
                email: 'dr.kaya@chu-brazza.cg'
            }
        };

        // Gestion du login
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const role = document.getElementById('loginRole').value;
            
            // Vérification simple (démo)
            if (demoUsers[email] && demoUsers[email].password === password) {
                currentUser = demoUsers[email];
                login(currentUser);
            } else {
                alert('Email ou mot de passe incorrect. Utilisez les comptes de démo.');
            }
        });

        function login(user) {
            // Masquer login, afficher dashboard
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            
            // Mettre à jour les infos utilisateur
            document.getElementById('userName').textContent = user.name;
            document.getElementById('userRole').textContent = getRoleLabel(user.role);
            
            // Adapter l'interface selon le rôle
            adaptInterfaceForRole(user.role);
            
            // Afficher alertes spécifiques
            if (user.role === 'patient') {
                document.getElementById('alertHypertension').style.display = 'flex';
            }
            
            showSection('accueil');
        }

        function logout() {
            currentUser = null;
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('loginForm').reset();
        }

        function getRoleLabel(role) {
            const labels = {
                'patient': 'Patient',
                'doctor': 'Médecin',
                'nurse': 'Infirmier(ère)',
                'lab': 'Laboratoire',
                'pharmacy': 'Pharmacie',
                'admin': 'Administrateur'
            };
            return labels[role] || role;
        }

        function adaptInterfaceForRole(role) {
            // Afficher/masquer les éléments selon le rôle
            const elements = {
                'navDossier': ['patient'],
                'navOrdonnances': ['patient'],
                'navResultats': ['patient'],
                'navImagerie': ['patient'],
                'navPatients': ['doctor', 'nurse']
            };
            
            for (const [elementId, roles] of Object.entries(elements)) {
                const element = document.getElementById(elementId);
                if (element) {
                    element.style.display = roles.includes(role) ? 'block' : 'none';
                }
            }
        }

        function showSection(section) {
            // Masquer toutes les sections
            document.querySelectorAll('.section-content').forEach(el => {
                el.classList.add('hidden');
            });
            
            // Afficher la section demandée
            const targetSection = document.getElementById(`section-${section}`);
            if (targetSection) {
                targetSection.classList.remove('hidden');
            }
            
            // Mettre à jour le titre
            const titles = {
                'accueil': 'Tableau de bord',
                'dossier': 'Dossier Médical',
                'rdv': 'Rendez-vous',
                'ordonnances': 'Ordonnances',
                'resultats': 'Résultats d\'examens',
                'imagerie': 'Imagerie médicale',
                'messages': 'Messagerie',
                'patients': 'Mes Patients'
            };
            document.getElementById('pageTitle').textContent = titles[section] || section;
            
            // Mettre à jour la navigation active
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
            });
            event?.target?.classList.add('active');
            
            currentSection = section;
        }

        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function bookAppointment() {
            const type = document.getElementById('rdvType').value;
            const medecin = document.getElementById('rdvMedecin').value;
            const date = document.getElementById('rdvDate').value;
            const heure = document.getElementById('rdvHeure').value;
            
            if (!type || !medecin || !date || !heure) {
                alert('Veuillez remplir tous les champs');
                return;
            }
            
            alert(`✅ Rendez-vous confirmé!\n\nType: ${type}\nMédecin: ${medecin}\nDate: ${date} à ${heure}\n\nUn SMS de confirmation vous sera envoyé.`);
            closeModal('rdvModal');
            document.getElementById('rdvForm').reset();
            
            // Mettre à jour le compteur
            const count = document.getElementById('nextRdvCount');
            count.textContent = parseInt(count.textContent) + 1;
        }

        function sendMessage() {
            const destinataire = document.getElementById('msgDestinataire').value;
            const sujet = document.getElementById('msgSujet').value;
            const contenu = document.getElementById('msgContenu').value;
            
            if (!destinataire || !sujet || !contenu) {
                alert('Veuillez remplir tous les champs');
                return;
            }
            
            alert(`✅ Message envoyé avec succès!\n\nDestinataire: ${destinataire}\nSujet: ${sujet}`);
            closeModal('messageModal');
            document.getElementById('messageForm').reset();
        }

        function viewConsultation(id) {
            alert(`Consultation #${id}\n\nDétails complets de la consultation:\n- Diagnostic détaillé\n- Traitements prescrits\n- Recommandations\n- Prochain RDV suggéré`);
        }

        function viewPrescription(id) {
            alert(`Ordonnance #${id}\n\nMédicaments:\n1. Amlodipine 5mg - 1 comprimé par jour\n2. Metformine 500mg - 2 comprimés par jour\n\nDurée: 30 jours\nRenouvellements: 2`);
        }

        function downloadResult(id) {
            alert(`Téléchargement du résultat #${id}...\n\nLe fichier PDF sera disponible dans votre dossier Téléchargements.`);
        }

        function viewImaging(id) {
            alert(`Rapport d'imagerie #${id}\n\nType: Échographie abdominale\nRadiologue: Dr. Sarah Ibara\nDate: 11 mai 2026\n\nConclusion: Stéatose hépatique modérée. Reins normaux.`);
        }

        function readMessage(id) {
            alert(`Message #${id}\n\nDe: Dr. Kaya\nSujet: Résultats de vos examens\nDate: Aujourd'hui, 09:45\n\nBonjour Mme Diallo,\n\nVos résultats d'examens sont disponibles. La glycémie est légèrement élevée. Je vous recommande de...\n\nCordialement,\nDr. Kaya`);
        }

        function refreshData() {
            alert('🔄 Actualisation des données...\n\nLes dernières informations ont été chargées.');
        }

        // Fermer les modals en cliquant à l'extérieur
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('active');
            }
        }

        // Initialisation
        console.log('🏥 MedLink Brazzaville - Prototype chargé');
        console.log('Comptes de démo:');
        console.log('- Patient: sophie.diallo@gmail.com / password123');
        console.log('- Médecin: dr.kaya@chu-brazza.cg / password123');
    </script>
